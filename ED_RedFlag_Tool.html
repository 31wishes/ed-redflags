<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ED Red Flags">
<meta name="theme-color" content="#C0392B">
<title>ED Red Flag Reference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --red: #C0392B;
    --red-dark: #96281B;
    --red-light: #FDECEA;
    --red-mid: #E57373;
    --amber: #E67E22;
    --amber-light: #FEF3E2;
    --green: #1A7F5A;
    --green-light: #E8F8F1;
    --ink: #1a1a1a;
    --ink2: #5a5a5a;
    --surface: #ffffff;
    --surface2: #f5f5f5;
    --border: rgba(0,0,0,0.1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --red: #E05545;
      --red-dark: #C0392B;
      --red-light: #2d1a18;
      --red-mid: #c0392b;
      --amber: #F0A030;
      --amber-light: #2a1f0e;
      --green: #2ECC8A;
      --green-light: #0e2a1e;
      --ink: #f0f0f0;
      --ink2: #a0a0a0;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.1);
    }
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--surface2);
    color: var(--ink);
    overflow: hidden;
  }

  /* APP SHELL */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
  }

  /* HEADER */
  .header {
    background: var(--red);
    color: #fff;
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    padding-top: calc(env(safe-area-inset-top, 12px) + 12px);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .header-icon {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }

  .header p {
    font-size: 11px;
    opacity: 0.8;
    margin-top: 1px;
  }

  .disclaimer-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 3px 8px;
    font-size: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* SEARCH */
  .search-wrap {
    padding: 8px 12px;
    background: rgba(255,255,255,0.12);
  }

  .search-input {
    width: 100%;
    padding: 8px 14px 8px 36px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.9);
    color: #1a1a1a;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    appearance: none;
    position: relative;
  }

  .search-input::placeholder { color: #888; }

  .search-container {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: #888;
    pointer-events: none;
  }

  /* CATEGORY PILLS */
  .pills-wrap {
    padding: 6px 12px 8px;
    background: rgba(255,255,255,0.08);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-shrink: 0;
  }

  .pills-wrap::-webkit-scrollbar { display: none; }

  .pill {
    padding: 5px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.35);
    font-size: 12px;
    white-space: nowrap;
    cursor: pointer;
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9);
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .pill.active {
    background: #fff;
    color: var(--red);
    border-color: #fff;
  }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* LIST VIEW */
  .list-view {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 12px;
    display: none;
  }

  .list-view.visible { display: block; }

  .list-item {
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 0.5px solid var(--border);
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }

  .list-item:active { background: var(--red-light); }

  .list-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--red-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .list-text { flex: 1; }

  .list-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }

  .list-cat {
    font-size: 12px;
    color: var(--ink2);
    margin-top: 2px;
  }

  .list-count {
    font-size: 12px;
    color: var(--red);
    font-weight: 600;
    background: var(--red-light);
    padding: 3px 8px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .list-chevron {
    color: var(--ink2);
    font-size: 14px;
    flex-shrink: 0;
  }

  /* DETAIL VIEW */
  .detail-view {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
    flex-direction: column;
  }

  .detail-view.visible { display: flex; }

  .detail-top-bar {
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    background: var(--red-light);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 14px;
    color: var(--red);
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .back-btn:active { opacity: 0.7; }

  .detail-header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }

  .detail-content {
    padding: 14px 14px;
    padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
  }

  .stats-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .stat-chip {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
  }

  .stat-chip.red { background: var(--red-light); color: var(--red); }
  .stat-chip.amber { background: var(--amber-light); color: var(--amber); }
  .stat-chip.green { background: var(--green-light); color: var(--green); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--ink2);
    margin: 14px 0 8px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }

  .red-flag-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: var(--red-light);
    border-left: 3px solid var(--red-mid);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .dot.red { background: var(--red); }
  .dot.amber { background: var(--amber); }

  .rf-text { font-size: 14px; color: var(--ink); line-height: 1.5; }
  .rf-bold { font-weight: 600; }
  .rf-note { color: var(--red); font-size: 12px; display: block; margin-top: 2px; }

  .warn-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 6px;
    background: var(--amber-light);
    border-left: 3px solid #F0AC55;
  }

  .action-box {
    background: var(--green-light);
    border: 0.5px solid #82C9A8;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    font-size: 14px;
    color: var(--green);
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.4;
  }

  .action-check { font-weight: 700; flex-shrink: 0; }

  .disclaimer-box {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--ink2);
    line-height: 1.6;
  }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink2);
    font-size: 15px;
  }

  .empty-icon { font-size: 40px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-icon">🏥</div>
      <div style="flex:1">

    <div class="search-wrap">

      </div>
    </div>
    <div class="pills-wrap" id="pillsWrap"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="list-view visible" id="listView"></div>
    <div class="detail-view" id="detailView"></div>
  </div>

</div>

const CATEGORIES = [...new Set(DATA.map(d => d.category))];
let activeCategory = null;
let searchTerm = '';

function filterAll() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  renderList();
}

function setCategory(cat) {
  activeCategory = (activeCategory === cat) ? null : cat;
  renderPills();
  renderList();
}

function renderPills() {
  const wrap = document.getElementById('pillsWrap');
  wrap.innerHTML = CATEGORIES.map(cat =>
    `<button class="pill${activeCategory===cat?' active':''}" onclick="setCategory('${cat}')">${cat.split(' / ')[0].split(' ')[0]}</button>`
  ).join('');
}

function renderList() {
  const filtered = DATA.filter(d => {
    const matchCat = !activeCategory || d.category === activeCategory;
    const matchSearch = !searchTerm ||
      d.complaint.toLowerCase().includes(searchTerm) ||
      d.category.toLowerCase().includes(searchTerm) ||
      d.redFlags.some(f => f.text.toLowerCase().includes(searchTerm));
    return matchCat && matchSearch;
  });

  const lv = document.getElementById('listView');
  if (filtered.length === 0) {
    lv.innerHTML = '<div class="no-results"><span class="empty-icon">🔍</span>No results found</div>';
    return;
  }

  lv.innerHTML = filtered.map(d => `
    <div class="list-item" onclick="showDetail(${d.id})">
      <div class="list-icon">${d.icon}</div>
      <div class="list-text">
        <div class="list-title">${d.complaint}</div>
        <div class="list-cat">${d.category}</div>
      </div>
      <div class="list-count">🚩 ${d.redFlags.length}</div>
      <div class="list-chevron">›</div>
    </div>
  `).join('');
}

function showDetail(id) {
  const d = DATA.find(x => x.id === id);
  const dv = document.getElementById('detailView');

  dv.innerHTML = `
    <div class="detail-top-bar">
      <button class="back-btn" onclick="showList()">‹ Back</button>
      <span class="detail-header-title">${d.icon} ${d.complaint}</span>
    </div>
    <div class="detail-content">
      <div class="stats-row">
        <span class="stat-chip red">🚩 ${d.redFlags.length} red flags</span>
        <span class="stat-chip amber">⚠️ ${d.caution.length} cautions</span>
        <span class="stat-chip green">✔ ${d.actions.length} actions</span>
      </div>

      <div class="section-label">🚩 Red Flag Symptoms</div>
      ${d.redFlags.map(f => `
        <div class="red-flag-item">
          <div class="dot red"></div>
          <div class="rf-text">
            <span class="rf-bold">${f.text}</span>
            ${f.note ? `<span class="rf-note">→ ${f.note}</span>` : ''}
          </div>
        </div>
      `).join('')}

      <div class="section-label">⚠️ Clinical Cautions</div>
      ${d.caution.map(c => `
        <div class="warn-item">
          <div class="dot amber"></div>
          <div class="rf-text" style="font-size:13.5px">${c}</div>
        </div>
      `).join('')}

      <div class="section-label">✔ Key Immediate Actions</div>
      ${d.actions.map(a => `
        <div class="action-box">
          <span class="action-check">✓</span>
          <span>${a}</span>
        </div>
      `).join('')}

      <div class="disclaimer-box">
        <strong>Disclaimer:</strong> Clinical reference only. Does not replace clinical judgment, institutional protocols, or specialty consultation. Always evaluate in context of the full clinical picture.
      </div>
    </div>
  `;

  document.getElementById('listView').classList.remove('visible');
  dv.classList.add('visible');
  dv.scrollTop = 0;
}

function showList() {
  document.getElementById('detailView').classList.remove('visible');
  document.getElementById('listView').classList.add('visible');
}

renderPills();
renderList();
</script>
